name: validate

# main IS the published plugin (marketplace source "."), so gate every push and PR:
# a malformed manifest, broken kit JSON, schema-violating example, or version drift
# would otherwise reach consumers the moment it lands.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifests:
    name: POSIX manifests and fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # jq + ruby are preinstalled on ubuntu-latest; node provides npx for ajv.
      - name: Validate manifests, kit JSON, schema, frontmatter, version sync
        run: ./scripts/check-manifests.sh

  powershell-harness:
    name: PowerShell harness and gate fixtures
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Validate PowerShell run-artifact fixtures
        shell: pwsh
        run: |
          ./scripts/test-config-profiles.ps1
          ./scripts/test-installers.ps1
          ./scripts/test-validate-run.ps1
          ./scripts/test-validate-learning.ps1
          ./scripts/test-promote-lesson.ps1
          ./scripts/test-promote-lesson-picker.ps1
          ./scripts/test-mark-stale-learning.ps1
          ./scripts/test-semantic-learning.ps1
          ./scripts/test-gates.ps1
